# Multi-session configuration for AAItrade
# Run with: aaitrade --multi config/multi_session.yaml
#
# To add a new session while running:
#   1. Add it here
#   2. Restart: aaitrade --multi config/multi_session.yaml
#      (existing sessions auto-recover from DB, new one starts fresh)

sessions:
  # ── Balanced (10 market days = ~2 calendar weeks) ──────────────────────
  - name: balanced-5d
    capital: 20000
    mode: balanced
    execution: paper
    days: 5
    watchlist: config/watchlist_seed.yaml
    interval: 180

  # ── Aggressive ─────────────────────────────────────────────────────────
  - name: aggressive-5d
    capital: 20000
    mode: aggressive
    execution: paper
    days: 5
    watchlist: config/watchlist_seed.yaml
    interval: 180

  # ── Safe baseline ───────────────────────────────────────────────────────
  - name: safe-5d
    capital: 20000
    mode: safe
    execution: paper
    days: 5
    watchlist: config/watchlist_seed.yaml
    interval: 180
    watchlist_adjust: false
