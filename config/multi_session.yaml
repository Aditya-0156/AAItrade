# Multi-session configuration for AAItrade
# Run with: aaitrade --multi config/multi_session.yaml
#
# To add a new session while running:
#   1. Add it here
#   2. Restart: aaitrade --multi config/multi_session.yaml
#      (existing sessions auto-recover from DB, new one starts fresh)

sessions:
  # ── Balanced standard (primary test) ─────────────────────────────────────
  - name: balanced-14d
    capital: 20000
    mode: balanced
    execution: paper
    days: 14
    watchlist: config/watchlist_seed.yaml
    interval: 120  # Increased to 2h to reduce token load
    model: claude-sonnet-4-6

  # ── Aggressive standard (risk testing) ───────────────────────────────────
  - name: aggressive-14d
    capital: 20000
    mode: aggressive
    execution: paper
    days: 14
    watchlist: config/watchlist_seed.yaml
    interval: 120  # Increased to 2h to reduce token load
    model: claude-sonnet-4-6

  # ── Safe baseline (cheap, Haiku model) ───────────────────────────────────
  - name: safe-locked
    capital: 20000
    mode: safe
    execution: paper
    days: 14
    watchlist: config/watchlist_seed.yaml
    interval: 120
    model: claude-haiku-4-5-20251001  # ~80% cheaper, good for safe rules-based trading
    watchlist_adjust: false
